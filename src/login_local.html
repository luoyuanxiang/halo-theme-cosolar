<!-- ========================================== -->
<!--    Login Local - 本地登录表单              -->
<!--    Cosolar Theme · 左右分栏               -->
<!-- ========================================== -->

<div th:remove="tag" th:fragment="form">
    <!-- 隐藏的加密密码字段 (加密逻辑在 common.html 的 basicScriptResources 中) -->
    <input type="hidden" name="password" id="password" />

    <!-- 用户名 -->
    <div class="cos-fg">
        <label for="username" class="cos-label">用户名或邮箱</label>
        <div class="cos-iwrap">
            <svg class="cos-iicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input id="username" name="username" type="text" placeholder="请输入用户名或邮箱"
                autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off"
                required autofocus class="cos-input" />
        </div>
    </div>

    <!-- 密码 -->
    <div class="cos-fg">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <label for="plainPassword" class="cos-label" style="margin-bottom:0;">密码</label>
            <a tabindex="-1" th:href="@{/password-reset/email}"
                style="font-size:13px;font-weight:500;color:var(--c-primary);text-decoration:none;transition:color .2s;"
                onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">忘记密码?</a>
        </div>
        <div class="toggle-password-display-flag cos-iwrap">
            <svg class="cos-iicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="plainPassword" type="password" placeholder="请输入密码"
                autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off"
                required maxlength="257" class="cos-input" />
            <!-- 密码显示/隐藏切换 -->
            <div class="toggle-password-button cos-pwd-toggle">
                <svg class="password-hidden-icon" style="display:none;width:20px;height:20px;" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3c5.392 0 9.878 3.88 10.819 9c-.94 5.12-5.427 9-10.819 9c-5.392 0-9.878-3.88-10.818-9C2.122 6.88 6.608 3 12 3Zm0 16a9.005 9.005 0 0 0 8.778-7a9.005 9.005 0 0 0-17.555 0A9.005 9.005 0 0 0 12 19Zm0-2.5a4.5 4.5 0 1 1 0-9a4.5 4.5 0 0 1 0 9Zm0-2a2.5 2.5 0 1 0 0-5a2.5 2.5 0 0 0 0 5Z"/></svg>
                <svg class="password-display-icon" style="width:20px;height:20px;" viewBox="0 0 24 24"><path fill="currentColor" d="M17.883 19.297A10.949 10.949 0 0 1 12 21c-5.392 0-9.878-3.88-10.818-9A10.982 10.982 0 0 1 4.52 5.935L1.394 2.808l1.414-1.414l19.799 19.798l-1.414 1.415l-3.31-3.31ZM5.936 7.35A8.965 8.965 0 0 0 3.223 12a9.005 9.005 0 0 0 13.201 5.838l-2.028-2.028A4.5 4.5 0 0 1 8.19 9.604L5.936 7.35Zm6.978 6.978l-3.242-3.241a2.5 2.5 0 0 0 3.241 3.241Zm7.893 2.265l-1.431-1.431A8.935 8.935 0 0 0 20.778 12A9.005 9.005 0 0 0 9.552 5.338L7.974 3.76C9.221 3.27 10.58 3 12 3c5.392 0 9.878 3.88 10.819 9a10.947 10.947 0 0 1-2.012 4.593Zm-9.084-9.084a4.5 4.5 0 0 1 4.769 4.769l-4.77-4.77Z"/></svg>
            </div>
        </div>
    </div>
</div>
