<include src="layout.html">
  <template name="head">
    <title th:text="|${(theme.config?.links?.links_title ?: '友情链接')} - ${site.title}|">友情链接</title>
    <script type="module" src="./js/links.ts"></script>
  </template>

  <div
    class="layout-grid no-sidebar"
    th:with="
      linksTitle = ${theme.config?.links?.links_title ?: '友情链接'},
      linksSubtitle = ${theme.config?.links?.links_subtitle ?: '与优秀的开发者们互相学习，共同进步，以下是我精心挑选的技术伙伴们'},
      totalLinks = ${linkFinder.count()},
      totalGroups = ${groups != null ? #lists.size(groups) : 0}
    "
  >
    <div class="content-area">
      <!-- ===== Links Hero (双栏：左内容+右插画) ===== -->
      <section class="links-hero" th:with="cover = ${theme.config?.links?.links_cover}">
        <div class="links-hero-bg" th:if="${!#strings.isEmpty(cover)}">
          <img th:src="${cover}" alt="" loading="lazy" />
        </div>
        <div class="links-hero-bg--fallback" th:unless="${!#strings.isEmpty(cover)}"></div>
        <div class="links-hero-overlay" th:if="${!#strings.isEmpty(cover)}"></div>

        <div class="links-hero-content">
          <!-- 左侧：标题 + 统计 -->
          <div class="links-hero-left">
            <span class="links-hero-eyebrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
              </svg>
              <span th:text="${linksTitle}">友情链接</span>
            </span>
            <h1 th:text="${linksTitle}">友情链接</h1>
            <p class="links-hero-desc" th:text="${linksSubtitle}">
              与优秀的开发者们互相学习，共同进步
            </p>

            <!-- 统计栏 (集成在 Hero 内) -->
            <div class="links-hero-stats">
              <div class="links-hero-stat">
                <div class="links-hero-stat-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                  </svg>
                </div>
                <div class="links-hero-stat-text">
                  <span class="links-hero-stat-num" th:text="${totalLinks}">0</span>
                  <span class="links-hero-stat-label">友链网站</span>
                </div>
              </div>
              <span class="links-hero-stat-divider"></span>
              <div class="links-hero-stat">
                <div class="links-hero-stat-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                  </svg>
                </div>
                <div class="links-hero-stat-text">
                  <span class="links-hero-stat-num" th:text="${totalGroups}">0</span>
                  <span class="links-hero-stat-label">链接分组</span>
                </div>
              </div>
              <span class="links-hero-stat-divider"></span>
              <div class="links-hero-stat">
                <div class="links-hero-stat-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 16a6 6 0 0 1 12 0" />
                    <path d="M6 8a6 6 0 0 1 12 0" />
                  </svg>
                </div>
                <div class="links-hero-stat-text">
                  <span class="links-hero-stat-num">∞</span>
                  <span class="links-hero-stat-label">无限可能</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </section>

      <!-- ===== 友链列表区域 ===== -->
      <section class="links-section">
        <!-- 区域标题 -->
        <div class="links-section-header">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19.2 2.96c1.4 9.3-4.5 17.04-8.2 17.04z" />
              <path d="M2 21c0-3 1.85-5.36 5.08-6" />
            </svg>
            友链列表
          </h2>
        </div>

        <!-- 筛选 + 搜索 -->
        <div class="links-toolbar" th:if="${not #lists.isEmpty(simpleGroups)}">
          <nav class="link-filters" id="linkFilters">
            <button
              type="button"
              class="link-filter active"
              data-group="__all__"
            >
              <span>全部</span>
              <small th:text="${totalLinks}"></small>
            </button>
            <button
              type="button"
              class="link-filter"
              th:each="item : ${simpleGroups}"
              th:attr="data-group=${item.metadata.name}"
              th:with="groupLinks = ${linkFinder.listBy(item.metadata.name)}"
            >
              <span th:text="${item.spec.displayName}"></span>
              <small th:text="${#lists.size(groupLinks)}"></small>
            </button>
          </nav>
          <div class="links-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="linksSearchInput"
              placeholder="搜索友链..."
              autocomplete="off"
            />
          </div>
        </div>

        <!-- 链接分组列表（始终渲染全部分组，分组切换由前端筛选，不再整页跳转） -->
        <section
          class="link-group"
          th:each="grp : ${groups}"
          data-link-group
          th:attr="data-group-name=${grp.metadata.name}"
        >
          <header class="link-group-header" th:if="${totalGroups > 1}">
            <h3 th:text="${grp.spec.displayName} ?: '未分组'"></h3>
            <small th:text="${#lists.size(grp.links) + ' 个站点'}"></small>
          </header>
          <div class="link-cards" th:unless="${#lists.isEmpty(grp.links)}">
            <a
              th:each="link : ${grp.links}"
              th:href="${link.spec.url}"
              class="link-card"
              target="_blank"
              rel="noopener"
              th:with="
                accessState=${link.status?.verification?.access?.state?.name()},
                backlinkState=${link.status?.verification?.backlink?.state?.name()},
                groupName=${grp.spec?.displayName}
              "
              data-link-item
              th:attr="data-name=${link.spec?.displayName},data-desc=${link.spec?.description},data-url=${link.spec?.url}"
            >
              <div class="link-card-head">
                <div class="link-card-logo">
                  <img
                    th:if="${!#strings.isEmpty(link.spec.logo)}"
                    th:src="${link.spec.logo}"
                    th:alt="${link.spec.displayName}"
                    loading="lazy"
                    onerror="this.style.display='none';this.parentElement.classList.add('is-fallback');"
                  />
                  <span
                    class="link-card-logo-fallback"
                    th:if="${#strings.isEmpty(link.spec.logo)}"
                    th:text="${#strings.substring(link.spec.displayName, 0, 1)}"
                  ></span>
                </div>
                <div class="link-card-title-row">
                  <span class="link-card-name" th:text="${link.spec.displayName}"></span>
                  <span class="link-card-url" th:text="${link.spec.url}"></span>
                </div>
                <svg
                  class="link-card-external"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                  <polyline points="15 3 21 3 21 9" />
                  <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
              </div>
              <p
                class="link-card-desc"
                th:if="${!#strings.isEmpty(link.spec.description)}"
                th:text="${link.spec.description}"
              >
                描述
              </p>
              <div class="link-card-footer">
                <span class="link-tag" th:text="${groupName}">分组</span>
                <div class="link-card-badges">
                  <span class="link-badge link-badge--ok" th:if="${accessState == 'ACCESSIBLE'}" title="链接可访问">
                    <span class="dot"></span>在线
                  </span>
                  <span class="link-badge link-badge--off" th:if="${accessState == 'INACCESSIBLE'}" title="链接不可访问">
                    <span class="dot"></span>离线
                  </span>
                  <span class="link-badge link-badge--check" th:if="${accessState == 'CHECKING'}" title="正在检测">
                    <span class="dot"></span>检测中
                  </span>
                  <span class="link-badge link-badge--back" th:if="${backlinkState == 'FOUND'}" title="已回链">
                    <span class="dot"></span>已回链
                  </span>
                  <span class="link-badge link-badge--back link-badge--back-miss" th:if="${backlinkState == 'MISSING'}" title="未回链">
                    <span class="dot"></span>未回链
                  </span>
                </div>
              </div>
            </a>
          </div>
          <div class="empty-state" th:if="${#lists.isEmpty(grp.links)}">
            <p>该分组下暂无链接</p>
          </div>
        </section>

        <!-- 搜索无结果提示 -->
        <div class="links-search-empty" id="linksSearchEmpty" style="display: none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <p>未找到匹配的友链</p>
          <small>尝试使用其他关键词搜索</small>
        </div>
      </section>

      <!-- ===== 申请友链 CTA ===== -->
      <section class="links-cta" th:with="applyEmail = ${theme.config?.social?.email}">
        <div class="links-cta-decoration links-cta-decoration--left">
          <svg viewBox="0 0 100 100" fill="none">
            <path d="M50 95 C50 70 35 50 10 45 C15 70 30 88 50 95 Z" fill="#34D399" opacity="0.18" />
            <path d="M50 95 C50 75 40 60 20 55" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.35" fill="none" />
            <path d="M35 70 C30 65 25 62 18 60" stroke="#10B981" stroke-width="1.2" stroke-linecap="round" opacity="0.25" fill="none" />
            <ellipse cx="32" cy="62" rx="6" ry="3" fill="#6EE7B7" opacity="0.2" transform="rotate(-30 32 62)" />
          </svg>
        </div>
        <div class="links-cta-decoration links-cta-decoration--right">
          <svg viewBox="0 0 80 80" fill="none">
            <path d="M30 5 C35 25 30 50 15 70 C10 50 15 25 30 5 Z" fill="#5EEAD4" opacity="0.15" />
            <path d="M28 10 C30 28 27 48 18 62" stroke="#2DD4BF" stroke-width="1.2" stroke-linecap="round" opacity="0.3" fill="none" />
            <ellipse cx="22" cy="35" rx="5" ry="2.5" fill="#6EE7B7" opacity="0.18" transform="rotate(40 22 35)" />
          </svg>
        </div>
        <div class="links-cta-decoration links-cta-decoration--leaf1">
          <svg viewBox="0 0 30 30" fill="none">
            <path d="M5 25 C8 15 15 8 25 5 C22 15 15 22 5 25 Z" fill="#34D399" opacity="0.12" />
          </svg>
        </div>
        <div class="links-cta-decoration links-cta-decoration--leaf2">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 20 C6 12 12 6 21 4 C18 12 12 18 3 20 Z" fill="#6EE7B7" opacity="0.1" />
          </svg>
        </div>
        <div class="links-cta-inner">
          <a
            class="links-cta-btn"
            th:if="${!#strings.isEmpty(applyEmail)}"
            th:href="'mailto:' + ${applyEmail} + '?subject=' + ${#strings.replace('申请友链 - ' + site.title, ' ', '%20')}"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
            <span>申请友链</span>
          </a>
          <p>如果您的网站符合本站友链要求，欢迎申请交换友链，一起构建更好的技术社区！</p>
        </div>
      </section>

      <!-- 评论组件 -->
      <div th:if="${haloCommentEnabled}" class="link-comments">
        <halo:comment
          group="plugin.halo.run"
          kind="Plugin"
          th:attr="name=${pluginName}"
        />
      </div>
    </div>
  </div>
</include>
