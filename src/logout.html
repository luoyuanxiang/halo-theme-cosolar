<!doctype html>
<html xmlns:th="https://www.thymeleaf.org"
    th:replace="~{gateway_fragments/layout :: layout(title = |退出登录 - ${site.title}|, head = ~{::head}, body = ~{::body})}">
<!-- 适配主题：halo-theme-cosolar — 青绿美学 · 左右分栏 · 明暗双模 -->
<head th:fragment="head">
    <!-- Cosolar 主题色防闪烁 -->
    <script>
        (function(){var s=localStorage.getItem("cosolar-theme");if(s){document.documentElement.setAttribute("data-theme",s);}else{var m=window.matchMedia("(prefers-color-scheme: dark)");if(m.matches)document.documentElement.setAttribute("data-theme","dark");}})();
    </script>

    <!-- Cosolar 登录页样式（退出页复用同一套分栏布局） -->
    <link rel="stylesheet" href="css/login.css" />
</head>
<th:block th:fragment="body">
<div class="cos-page" th:style="'--brand-ratio:' + (${theme.config?.login?.brand_ratio ?: 33}) + '%;' + '--ov-enabled:' + (${theme.config?.login?.brand_overlay_enabled ?: true} ? 'block' : 'none') + ';' + '--ov-color:' + (${theme.config?.login?.brand_overlay_color ?: '#059669'}) + ';' + '--ov-op:' + (${theme.config?.login?.brand_overlay_opacity ?: 0.6}) + ';' + '--ov-color-dark:' + (${theme.config?.login?.brand_overlay_color_dark ?: '#059669'}) + ';' + '--ov-op-dark:' + (${theme.config?.login?.brand_overlay_opacity_dark ?: 0.5}) + ';' + '--brand-text:' + (${theme.config?.login?.brand_text_color ?: '#FFFFFF'}) + ';'">

    <!-- ═══ 左侧：品牌展示区 ═══ -->
    <div class="cos-brand">
        <div class="cos-brand-overlay"></div>
        <div class="cos-brand-inner">

            <!-- Logo（与主题主站配置一致：logo_image_width/logo_image_height 可配、logo_text 未设显示空） -->
            <a class="cos-b-logo" th:href="@{/}">
                <img
                    class="cos-b-image"
                    th:if="${theme.config?.basic?.logo_image != null and !#strings.isEmpty(theme.config.basic.logo_image)}"
                    th:src="${theme.config.basic.logo_image}"
                    th:width="${theme.config?.basic?.logo_image_width ?: 'auto'}"
                    th:height="${theme.config?.basic?.logo_image_height ?: 'auto'}"
                    alt="Logo"
                />
                <span class="cos-b-icon"
                    th:unless="${theme.config?.basic?.logo_image != null and !#strings.isEmpty(theme.config.basic.logo_image)}"
                    th:style="'width:' + (${theme.config?.basic?.logo_image_width ?: 36}) + 'px;height:' + (${theme.config?.basic?.logo_image_height ?: 36}) + 'px;'">&lt;/&gt;</span>
                <span class="cos-b-text">
                    <span class="cos-b-name" th:text="${theme.config?.basic?.logo_text ?: ''}">码迹志</span>
                    <span class="cos-b-sub" th:text="${theme.config?.basic?.tagline ?: site.subtitle}">记录技术成长</span>
                </span>
            </a>

            <!-- 中间留白（背景图为视觉主体） -->
            <div class="cos-brand-spacer"></div>

            <!-- 底部标语 -->
            <div class="cos-b-quote">
                <div class="cos-b-quote-icon">&#x201C;</div>
                <div class="cos-b-quote-title" th:text="${theme.config?.basic?.tagline ?: '记录 · 思考 · 分享 · 成长'}">记录 · 思考 · 分享 · 成长</div>
                <div class="cos-b-quote-desc">与技术同行，与世界连接</div>
                <div class="cos-b-dots"><span class="cos-b-dot active"></span><span class="cos-b-dot"></span><span class="cos-b-dot"></span></div>
            </div>
        </div>
    </div>

    <!-- ═══ 右侧：退出确认卡片 ═══ -->
    <div class="cos-form-area">
        <div class="cos-card">
            <h1 class="cos-title">确认退出</h1>
            <p class="cos-subtitle">您确定要退出当前账户吗？</p>

            <!-- 退出登录表单 -->
            <div th:replace="~{gateway_fragments/logout::form}"></div>
        </div>
    </div>

</div><!-- /.cos-page -->
</th:block>
</html>
