<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="http://www.thymeleaf.org"
  th:data-color-scheme="${theme.config?.style?.color_scheme ?: 'auto'}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <slot name="head">
      <title th:text="${site.title}">Site Title</title>
    </slot>
    <link rel="stylesheet" href="./css/main.css" />
    <link
      rel="stylesheet"
      href="./assets/fonts/iconfont.css"
      th:unless="${theme.config?.style?.icon_css_url != null and !#strings.isEmpty(theme.config.style.icon_css_url)}"
    />
    <link
      rel="stylesheet"
      th:if="${theme.config?.style?.icon_css_url != null and !#strings.isEmpty(theme.config.style.icon_css_url)}"
      th:href="${theme.config.style.icon_css_url}"
    />
    <link
      rel="stylesheet"
      th:if="${theme.config?.style?.font_css_url != null and !#strings.isEmpty(theme.config.style.font_css_url)}"
      th:href="${theme.config.style.font_css_url}"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="stylesheet"
      th:unless="${theme.config?.style?.font_css_url != null and !#strings.isEmpty(theme.config.style.font_css_url)}"
      href="//npm.elemecdn.com/lxgw-wenkai-screen-webfont/style.css"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="stylesheet"
      th:if="${theme.config?.style?.mono_css_url != null and !#strings.isEmpty(theme.config.style.mono_css_url)}"
      th:href="${theme.config.style.mono_css_url}"
      media="print"
      onload="this.media = 'all'"
    />
    <link rel="icon" th:if="${site.favicon != null and !#strings.isEmpty(site.favicon)}" th:href="${site.favicon}" />
    <th:block
      th:if="${theme.config?.style?.primary_color != null or theme.config?.style?.content_width != null or theme.config?.style?.sidebar_width != null or theme.config?.style?.content_gap != null or theme.config?.style?.toc_width != null or (theme.config?.style?.font_family != null and !#strings.isEmpty(theme.config.style.font_family)) or (theme.config?.style?.mono_family != null and !#strings.isEmpty(theme.config.style.mono_family)) or theme.config?.sidebar?.author_bg_overlay_color != null or theme.config?.sidebar?.author_bg_overlay_opacity != null or theme.config?.sidebar?.author_bg_text_color != null or theme.config?.sidebar?.author_bg_overlay_color_dark != null or theme.config?.sidebar?.author_bg_overlay_opacity_dark != null or theme.config?.sidebar?.author_bg_text_color_dark != null}"
    >
      <style th:inline="text">
        :root {
          [(${theme.config?.style?.primary_color != null ? '--color-primary: ' + theme.config.style.primary_color + ' !important;' : ''})]
          [(${theme.config?.style?.content_width != null ? '--container-max: ' + theme.config.style.content_width + 'px !important;' : ''})]
          [(${theme.config?.style?.sidebar_width != null ? '--sidebar-width: ' + theme.config.style.sidebar_width + 'px !important;' : ''})]
          [(${theme.config?.style?.content_gap != null ? '--content-gap: ' + theme.config.style.content_gap + 'px !important;' : ''})]
          [(${theme.config?.style?.toc_width != null ? '--toc-width: ' + theme.config.style.toc_width + 'px !important;' : ''})]
          [(${theme.config?.style?.font_family != null and !#strings.isEmpty(theme.config.style.font_family) ? '--font-sans: ' + theme.config.style.font_family + ' !important;' : ''})]
          [(${theme.config?.style?.mono_family != null and !#strings.isEmpty(theme.config.style.mono_family) ? '--font-mono: ' + theme.config.style.mono_family + ' !important;' : ''})]
          [(${theme.config?.sidebar?.author_bg_overlay_color != null ? '--author-bg-overlay-color: ' + theme.config.sidebar.author_bg_overlay_color + ' !important;' : ''})]
          [(${theme.config?.sidebar?.author_bg_overlay_opacity != null ? '--author-bg-overlay-opacity: ' + theme.config.sidebar.author_bg_overlay_opacity + ' !important;' : ''})]
          [(${theme.config?.sidebar?.author_bg_text_color != null ? '--author-bg-text-color: ' + theme.config.sidebar.author_bg_text_color + ' !important;' : ''})]
        }
        [data-theme="dark"] {
          [(${theme.config?.sidebar?.author_bg_overlay_color_dark != null ? '--author-bg-overlay-color: ' + theme.config.sidebar.author_bg_overlay_color_dark + ' !important;' : ''})]
          [(${theme.config?.sidebar?.author_bg_overlay_opacity_dark != null ? '--author-bg-overlay-opacity: ' + theme.config.sidebar.author_bg_overlay_opacity_dark + ' !important;' : ''})]
          [(${theme.config?.sidebar?.author_bg_text_color_dark != null ? '--author-bg-text-color: ' + theme.config.sidebar.author_bg_text_color_dark + ' !important;' : ''})]
        }
      </style>
    </th:block>
    <!-- 代码高亮由 Halo plugin-shiki (shiki-code Web Component) 负责，主题不再加载 Prism -->
    <!-- 主题色防闪烁：必须在 head 同步执行，仅读 data-color-scheme 设 data-theme，auto 时跟随系统 -->
    <script>
      (function () {
        var saved = localStorage.getItem("cosolar-theme");
        var scheme = document.documentElement.getAttribute("data-color-scheme") || "auto";
        var theme =
          saved ||
          (scheme === "auto"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : scheme);
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.setAttribute("data-color-scheme", theme);
      })();
    </script>
    <script type="module" src="./js/main.ts"></script>
  </head>
  <body
    th:with="lightBgType = ${theme.config?.background_light?.bg_type ?: 'none'},
                  lightBgImage = ${theme.config?.background_light?.bg_image},
                  lightBgImageOpacity = ${theme.config?.background_light?.bg_image_opacity ?: 0.2},
                  lightBgDynamicType = ${theme.config?.background_light?.bg_dynamic_type ?: 'particles'},
                  lightBgDynamicColor1 = ${theme.config?.background_light?.bg_dynamic_color1 ?: '#10B981'},
                  lightBgDynamicColor2 = ${theme.config?.background_light?.bg_dynamic_color2 ?: '#3B82F6'},
                  lightBgDynamicOpacity = ${theme.config?.background_light?.bg_dynamic_opacity ?: 0.15},
                  darkBgType = ${theme.config?.background_dark?.bg_type ?: 'none'},
                  darkBgImage = ${theme.config?.background_dark?.bg_image},
                  darkBgImageOpacity = ${theme.config?.background_dark?.bg_image_opacity ?: 0.2},
                  darkBgDynamicType = ${theme.config?.background_dark?.bg_dynamic_type ?: 'stars'},
                  darkBgDynamicColor1 = ${theme.config?.background_dark?.bg_dynamic_color1 ?: '#10B981'},
                  darkBgDynamicColor2 = ${theme.config?.background_dark?.bg_dynamic_color2 ?: '#3B82F6'},
                  darkBgDynamicOpacity = ${theme.config?.background_dark?.bg_dynamic_opacity ?: 0.15},
                  hasLightBg = ${lightBgType != 'none'},
                  hasDarkBg = ${darkBgType != 'none'}"
    th:data-light-bg-type="${lightBgType}"
    th:data-light-bg-image="${lightBgImage}"
    th:data-light-bg-image-opacity="${lightBgImageOpacity}"
    th:data-light-bg-dynamic-type="${lightBgDynamicType}"
    th:data-light-bg-dynamic-color1="${lightBgDynamicColor1}"
    th:data-light-bg-dynamic-color2="${lightBgDynamicColor2}"
    th:data-light-bg-dynamic-opacity="${lightBgDynamicOpacity}"
    th:data-dark-bg-type="${darkBgType}"
    th:data-dark-bg-image="${darkBgImage}"
    th:data-dark-bg-image-opacity="${darkBgImageOpacity}"
    th:data-dark-bg-dynamic-type="${darkBgDynamicType}"
    th:data-dark-bg-dynamic-color1="${darkBgDynamicColor1}"
    th:data-dark-bg-dynamic-color2="${darkBgDynamicColor2}"
    th:data-dark-bg-dynamic-opacity="${darkBgDynamicOpacity}"
  >
    <!-- 页面背景层 -->
    <div class="site-bg" th:if="${hasLightBg or hasDarkBg}">
      <!-- 浅色模式背景 -->
      <div class="site-bg-light" th:if="${hasLightBg}">
        <div
          class="site-bg-image-light"
          th:if="${lightBgType == 'image' and lightBgImage != null and !#strings.isEmpty(lightBgImage)}"
          th:style="'background-image: url(' + ${lightBgImage} + '); --site-bg-img-opacity: ' + ${lightBgImageOpacity} + ';'"
        ></div>
        <canvas class="site-bg-canvas-light" th:if="${lightBgType == 'dynamic'}"></canvas>
      </div>
      <!-- 深色模式背景 -->
      <div class="site-bg-dark" th:if="${hasDarkBg}">
        <div
          class="site-bg-image-dark"
          th:if="${darkBgType == 'image' and darkBgImage != null and !#strings.isEmpty(darkBgImage)}"
          th:style="'background-image: url(' + ${darkBgImage} + '); --site-bg-img-opacity: ' + ${darkBgImageOpacity} + ';'"
        ></div>
        <canvas class="site-bg-canvas-dark" th:if="${darkBgType == 'dynamic'}"></canvas>
      </div>
    </div>

    <!-- ===== Header ===== -->
    <header class="site-header">
      <div class="header-inner container">
        <!-- Logo -->
        <a class="header-logo" th:href="@{/}">
          <img
            class="logo-image"
            th:if="${theme.config?.basic?.logo_image != null and !#strings.isEmpty(theme.config.basic.logo_image)}"
            th:src="${theme.config.basic.logo_image}"
            th:width="${theme.config?.basic?.logo_image_width ?: 36}"
            th:height="${theme.config?.basic?.logo_image_height ?: 36}"
            alt="Logo"
          />
          <span class="logo-icon" th:unless="${theme.config?.basic?.logo_image != null and !#strings.isEmpty(theme.config.basic.logo_image)}">&lt;/&gt;</span>
          <span class="logo-text">
            <span class="logo-name" th:text="${theme.config?.basic?.logo_text ?: ''}">
              码迹志
            </span>
            <span class="logo-tagline" th:text="${theme.config?.basic?.tagline ?: site.subtitle}">
              记录技术成长，分享解决方案
            </span>
          </span>
        </a>

        <!-- Navigation -->
        <nav
          class="header-nav"
          id="headerNav"
          th:with="menu = ${menuFinder.getPrimary()}, iconPrefix = ${theme.config?.style?.icon_prefix ?: 'iconfont'}"
        >
          <a
            th:if="${menu != null and not #lists.isEmpty(menu.menuItems)}"
            th:each="item : ${menu.menuItems}"
            th:href="@{${item.status.href}}"
            th:target="${item.spec.target?.value}"
          >
            <i
              th:if="${#annotations.get(item, 'icon') != null and #annotations.get(item, 'icon') != ''}"
              th:class="${iconPrefix} + ' ' + ${#annotations.get(item, 'icon')}"
            ></i>
            <span th:text="${item.status.displayName}"></span>
          </a>
          <a th:unless="${menu != null and not #lists.isEmpty(menu.menuItems)}" th:href="@{/}"
            ><i class="iconfont icon-shouye"></i><span>首页</span></a
          >
          <a
            th:unless="${menu != null and not #lists.isEmpty(menu.menuItems)}"
            th:href="@{${site.routes.categoriesUri}}"
            ><i class="iconfont icon-fengfuduoyuan"></i><span>分类</span></a
          >
          <a
            th:unless="${menu != null and not #lists.isEmpty(menu.menuItems)}"
            th:href="@{${site.routes.tagsUri}}"
            ><i class="iconfont icon-bokexinwen"></i><span>标签</span></a
          >
          <a
            th:unless="${menu != null and not #lists.isEmpty(menu.menuItems)}"
            th:href="@{${site.routes.archivesUri}}"
            ><i class="iconfont icon-jishufuwu"></i><span>归档</span></a
          >
        </nav>

        <!-- Actions -->
        <div class="header-actions">
          <!-- Search -->
          <div
            class="search-box"
            th:if="${pluginFinder.available('PluginSearchWidget')}"
            onclick="javascript: SearchWidget.open();"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span class="search-placeholder">搜索文章</span>
            <span class="search-kbd">Ctrl K</span>
          </div>
          <a
            class="search-box"
            th:unless="${pluginFinder.available('PluginSearchWidget')}"
            th:href="@{${site.routes.archivesUri}}"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span class="search-placeholder">搜索文章</span>
          </a>

          <!-- Theme Toggle -->
          <button class="icon-btn" id="themeToggle" aria-label="切换主题">
            <svg
              class="moon-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <svg
              class="sun-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </button>

          <!-- Login / User Menu -->
          <th:block th:with="currentUser = ${contributorFinder.getContributor(#authentication.name)}">
            <!-- 已登录 -->
            <div th:if="${!#strings.equals(currentUser.name, 'anonymousUser')}" class="user-menu">
              <button class="action-login is-logged-in" type="button" aria-label="用户菜单" aria-haspopup="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="currentColor" fill-opacity="0" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path stroke-dasharray="22" d="M12 5c1.66 0 3 1.34 3 3c0 1.66 -1.34 3 -3 3c-1.66 0 -3 -1.34 -3 -3c0 -1.66 1.34 -3 3 -3Z"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.5s" values="22;0"></animate><animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s" to=".3"></animate></path><path stroke-dasharray="38" stroke-dashoffset="38" d="M12 14c4 0 7 2 7 3v2h-14v-2c0 -1 3 -3 7 -3Z"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.5s" to="0"></animate><animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s" to=".3"></animate></path></g></svg>
              </button>
              <div class="user-dropdown" role="menu">
                <div class="user-dropdown-info">
                  <span class="user-name" th:text="${currentUser.displayName}">用户名</span>
                </div>
                <a class="user-dropdown-item" th:href="@{/console}" role="menuitem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                  <span>控制台</span>
                </a>
                <div class="user-dropdown-divider"></div>
                <a class="user-dropdown-item user-dropdown-item-danger" th:href="@{/logout}" role="menuitem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                  <span>退出登录</span>
                </a>
              </div>
            </div>
            <!-- 未登录 -->
            <a
              class="action-login"
              th:unless="${!#strings.equals(currentUser.name, 'anonymousUser')}"
              th:href="@{/login}"
              aria-label="登录"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="currentColor" fill-opacity="0" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path stroke-dasharray="22" d="M12 5c1.66 0 3 1.34 3 3c0 1.66 -1.34 3 -3 3c-1.66 0 -3 -1.34 -3 -3c0 -1.66 1.34 -3 3 -3Z"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.5s" values="22;0"></animate><animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s" to=".3"></animate></path><path stroke-dasharray="38" stroke-dashoffset="38" d="M12 14c4 0 7 2 7 3v2h-14v-2c0 -1 3 -3 7 -3Z"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.5s" to="0"></animate><animate fill="freeze" attributeName="fill-opacity" begin="1.1s" dur="0.15s" to=".3"></animate></path></g></svg>
            </a>
          </th:block>

          <!-- Mobile Menu Toggle -->
          <button class="menu-toggle" id="menuToggle" aria-label="菜单">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </header>

    <!-- ===== Main Content ===== -->
    <main class="site-main">
      <div class="container">
        <slot />
      </div>
    </main>

    <!-- ===== Footer ===== -->
    <footer
      class="site-footer"
      th:style="${footerStyle}"
      th:with="
              githubUrl=${theme.config?.social?.github},
              emailAddr=${theme.config?.social?.email},
              wechatUrl=${theme.config?.social?.wechat},
              rssUrl=${theme.config?.social?.rss},
              juejinUrl=${theme.config?.social?.juejin},
              csdnUrl=${theme.config?.social?.csdn},
              zhihuUrl=${theme.config?.social?.zhihu},
              subscribeAction=${theme.config?.social?.footer_subscribe_action},
              privacyUrl=${theme.config?.footer?.privacy_url},
              termsUrl=${theme.config?.footer?.terms_url},
              footerLogo=${theme.config?.footer?.logo_image ?: theme.config?.basic?.logo_image},
              footerLogoWidth=${theme.config?.footer?.logo_image_width ?: theme.config?.basic?.logo_image_width ?: 40},
              footerLogoHeight=${theme.config?.footer?.logo_image_height ?: theme.config?.basic?.logo_image_height ?: 40},
              footerName=${theme.config?.footer?.logo_text ?: theme.config?.basic?.logo_text},
              footerTagline=${theme.config?.footer?.tagline ?: theme.config?.basic?.tagline},
              footerDesc=${(theme.config?.footer?.footer_description) != null and !#strings.isEmpty(theme.config?.footer?.footer_description) ? theme.config?.footer?.footer_description : footerTagline},
              footerBgImage=${theme.config?.footer?.bg_image},
              footerBgImageOpacity=${theme.config?.footer?.bg_image_opacity ?: 0.2},
              footerBgImageDark=${theme.config?.footer?.bg_image_dark},
              footerBgImageOpacityDark=${theme.config?.footer?.bg_image_opacity_dark ?: 0.2},
              footerSocialColor=${theme.config?.footer?.social_color},
              footerSocialColorDark=${theme.config?.footer?.social_color_dark},
              footerHasBgImg=${footerBgImage != null and footerBgImage != ''},
              footerHasBgImgDark=${footerBgImageDark != null and footerBgImageDark != ''},
              footerHasSocial=${footerSocialColor != null and footerSocialColor != ''},
              footerHasSocialDark=${footerSocialColorDark != null and footerSocialColorDark != ''},
              footerStyle=${(footerHasBgImg or footerHasBgImgDark or footerHasSocial or footerHasSocialDark) ? ('--footer-bg-image: url(''' + (footerHasBgImg ? footerBgImage : '') + '''); --footer-bg-img-opacity: ' + footerBgImageOpacity + '; --footer-bg-image-dark: url(''' + (footerHasBgImgDark ? footerBgImageDark : '') + '''); --footer-bg-img-opacity-dark: ' + footerBgImageOpacityDark + ';' + (footerHasSocial ? ' --footer-social-color: ' + footerSocialColor + ';' : '') + (footerHasSocialDark ? ' --footer-social-color-dark: ' + footerSocialColorDark + ';' : '')) : ''}"
    >
      <div class="container">
        <div class="footer-main">
          <!-- Brand -->
          <div class="footer-brand">
            <a class="footer-logo" th:href="@{/}">
              <img
                class="footer-logo-image"
                th:if="${footerLogo != null and !#strings.isEmpty(footerLogo)}"
                th:src="${footerLogo}"
                th:width="${footerLogoWidth ?: 40}"
                th:height="${footerLogoHeight ?: 40}"
                th:style="'width:' + (footerLogoWidth ?: 40) + 'px;height:' + (footerLogoHeight ?: 40) + 'px;'"
                alt="Logo"
              />
              <span
                class="footer-logo-icon"
                th:unless="${footerLogo != null and !#strings.isEmpty(footerLogo)}"
                th:text="${#strings.length(footerName) > 0 ? #strings.substring(footerName, 0, 1) : 'B'}"
              ></span>
              <div class="footer-logo-text">
                <span class="footer-logo-name" th:text="${footerName}"></span>
                <span class="footer-logo-tagline" th:text="${footerTagline}"></span>
              </div>
            </a>
            <p class="footer-desc" th:text="${footerDesc}">
              
            </p>
            <div class="footer-social">
              <a
                class="footer-social-link"
                th:if="${githubUrl != null and !#strings.isEmpty(githubUrl)}"
                th:href="${githubUrl}"
                target="_blank"
                rel="noopener"
                aria-label="GitHub"
              >
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
