<article
  class="article-card"
  th:each="post : ${posts.items}"
  th:object="${post}"
  th:with="readingUrl = ${#annotations.get(post, 'reading_url')}, postUrl = ${readingUrl != null and readingUrl != '' ? readingUrl : post.status.permalink}, isExternal = ${readingUrl != null and readingUrl != ''}"
>
  <!-- Thumbnail -->
  <a
    class="article-thumb"
    th:href="${postUrl}"
    th:target="${isExternal ? '_blank' : '_self'}"
    th:rel="${isExternal ? 'noopener' : ''}"
  >
    <img th:if="${post.spec.cover != null and !#strings.isEmpty(post.spec.cover)}" th:src="${post.spec.cover}" alt="" loading="lazy" />
    <span class="article-thumb-placeholder" th:unless="${post.spec.cover != null and !#strings.isEmpty(post.spec.cover)}">&lt;/&gt;</span>
  </a>

  <!-- Body -->
  <div class="article-body">
    <!-- Title -->
    <h3 class="article-card-title">
      <span class="pinned-badge" th:if="${post.spec.pinned}">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="width: 11px; height: 11px"
        >
          <line x1="12" y1="17" x2="12" y2="22" />
          <path d="M5 17h14l-1.5-3h-11z" />
          <path d="M8 14V5a4 4 0 0 1 8 0v9" />
        </svg>
        置顶
      </span>
      <a
        th:href="${postUrl}"
        th:target="${isExternal ? '_blank' : '_self'}"
        th:rel="${isExternal ? 'noopener' : ''}"
        th:text="${post.spec.title}"
      ></a>
    </h3>

    <!-- Excerpt -->
    <p class="article-card-excerpt" th:text="${post.status.excerpt}"></p>

    <!-- Tags -->
    <div class="article-card-tags" th:if="${not #lists.isEmpty(post.tags)}">
      <a
        th:each="tag : ${post.tags}"
        th:href="@{${tag.status.permalink}}"
        th:text="${tag.spec.displayName}"
        class="tag"
      ></a>
    </div>

    <!-- Meta -->
    <div class="article-card-meta">
      <span class="meta-item" th:if="${post.owner}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span th:text="${post.owner?.displayName}"></span>
      </span>
      <span class="meta-item" th:if="${not #lists.isEmpty(post.categories)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <a
          th:href="@{${post.categories[0].status.permalink}}"
          th:text="${post.categories[0].spec.displayName}"
          style="color: inherit"
        ></a>
      </span>
      <span class="meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <time th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}"></time>
      </span>
      <span class="meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        <span th:text="${post.stats?.visit ?: 0}"></span>
      </span>
      <span class="meta-item" th:if="${post.stats?.comment}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        <span th:text="${post.stats?.comment ?: 0}"></span>
      </span>
    </div>
  </div>
</article>
