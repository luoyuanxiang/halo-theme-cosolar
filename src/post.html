<include src="layout.html">
  <template name="head">
    <title th:text="|${post.spec.title} - ${site.title}|">文章标题</title>
    <script type="module" src="./js/post.ts"></script>
  </template>

  <div class="post-layout">
    <!-- Floating Action Bar -->
    <aside
      class="post-actions"
      id="postActions"
      th:with="upvoteCount = ${post.stats?.upvote ?: 0}, commentCount = ${post.stats?.comment ?: 0}"
    >
      <!-- 阅读进度条（横条上方彩色细条） -->
      <div class="reading-progress" id="readingProgress" aria-hidden="true"></div>
      <button class="action-btn action-toc" id="tocBtn" title="目录" aria-label="打开目录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        <span class="action-count toc-percent" id="tocPercent">0%</span>
      </button>
      <button
        class="action-btn action-upvote"
        id="upvoteBtn"
        th:attr="data-post=${post.metadata.name}"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 10v12" />
          <path
            d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"
          />
        </svg>
        <span class="action-count" id="upvoteCount" th:text="${upvoteCount}"></span>
      </button>
      <button class="action-btn action-comment" id="commentBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        <span class="action-count" th:text="${commentCount}"></span>
      </button>
      <button class="action-btn action-share" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
        </svg>
      </button>
      <div class="action-share-menu" id="shareMenu">
        <button class="share-item" data-share="wechat" title="微信分享">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M8.5 13.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm6 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2zM8.69 4C4.44 4 1 6.94 1 10.6c0 2.1 1.14 3.95 2.9 5.15L3 19l3.2-1.7c.79.2 1.63.3 2.49.3.2 0 .4 0 .6-.02-.16-.5-.25-1.02-.25-1.58 0-3.36 3.2-6.1 7.15-6.1.2 0 .4 0 .6.02C16.3 6.32 12.86 4 8.69 4zM21 12.5C21 9.46 18.14 7 14.6 7s-6.4 2.46-6.4 5.5 2.86 5.5 6.4 5.5c.7 0 1.36-.1 2-.28L19 19l-.6-1.9c1.6-.96 2.6-2.5 2.6-4.6z"
            />
          </svg>
          <span>微信</span>
        </button>
        <button class="share-item" data-share="weibo" title="微博分享">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M9.31 8.17c-3.43.34-6.04 2.6-6.04 5.07 0 2.64 3.88 4.4 8.17 3.95 4.28-.44 7.42-2.92 7.42-5.56 0-2.64-3.14-4.4-7.42-3.96-.05 0-.09.02-.13.02zM7.5 17.5c-2.2.13-4.1-1.3-4.23-2.9-.13-1.6 1.55-3.05 3.75-3.18 2.2-.13 4.1 1.3 4.23 2.9.13 1.6-1.55 3.05-3.75 3.18zm5.75-7.83c-.2-.05-.34-.08-.24-.35.23-.6.25-1.12.01-1.49-.46-.7-1.72-.67-3.16-.02 0 0-.45.2-.34-.16.22-.7.19-1.3-.15-1.64-.81-.81-2.96.03-4.8 1.88-1.38 1.38-2.18 2.96-2.18 4.27 0 2.52 3.23 4.05 6.39 4.05 4.14 0 6.9-2.4 6.9-4.31 0-1.15-.97-1.81-1.72-2.08zm6.45-2.08c-.7-.78-1.69-1.13-2.62-.97-.26.04-.43.29-.39.55.04.26.29.43.55.39.61-.1 1.26.13 1.71.63s.64 1.18.52 1.78c-.05.26.12.51.38.56.03.01.06.01.09.01.23 0 .43-.16.47-.39.18-.87-.07-1.78-.71-2.5zm1.8-1.64c-1.42-1.57-3.5-2.19-5.42-1.83-.3.06-.5.34-.44.64.06.3.34.5.64.44 1.5-.28 3.12.2 4.23 1.43 1.11 1.23 1.43 2.88.99 4.34-.09.29.07.6.36.69.05.02.11.02.16.02.24 0 .46-.15.53-.39.57-1.87.17-3.98-1.21-5.52zM7.62 15.06c-.42.1-.88-.07-1.02-.38-.14-.31.07-.65.48-.78.42-.13.88.04 1.02.35.14.31-.07.71-.48.81zm1.57-1.3c-.15.1-.34.1-.43-.02-.09-.12-.05-.31.1-.41.15-.1.34-.1.43.02.09.12.05.31-.1.41zm-.42-3.49c-2.2.13-3.88 1.58-3.75 3.18.13 1.6 2.03 3.03 4.23 2.9 2.2-.13 3.88-1.58 3.75-3.18-.13-1.6-2.03-3.03-4.23-2.9z"
            />
          </svg>
          <span>微博</span>
        </button>
        <button class="share-item" data-share="copy" title="复制链接">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <span>复制链接</span>
        </button>
      </div>
      <button class="action-btn action-backtop" id="backtopBtn" title="回到顶部">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="19" x2="12" y2="5" />
          <polyline points="5 12 12 5 19 12" />
        </svg>
      </button>
    </aside>

    <div class="content-area">
      <article class="article-detail"
               th:with="builtinCover = @{/assets/images/default_post_cover.png}, coverUrl = ${post.spec.cover != null and !#strings.isEmpty(post.spec.cover) ? post.spec.cover : (theme.config?.style?.default_post_cover != null and !#strings.isEmpty(theme.config.style.default_post_cover) ? theme.config.style.default_post_cover : builtinCover)}">
        <!-- Cover -->
        <div class="article-detail-cover" th:if="${coverUrl != null}">
          <img th:src="${coverUrl}" alt="" />
        </div>

        <!-- Header -->
        <header class="article-detail-header">
          <h1 class="article-detail-title" th:text="${post.spec.title}"></h1>
          <div class="article-detail-meta">
            <span class="meta-item" th:if="${post.owner}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <span th:text="${post.owner?.displayName}"></span>
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
              <time th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}"></time>
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <span th:text="${post.stats?.visit ?: 0} + ' 阅读'"></span>
            </span>
            <span class="meta-item" id="postWordCount" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="8" y1="13" x2="16" y2="13" />
                <line x1="8" y1="17" x2="16" y2="17" />
              </svg>
              <span class="word-count-text"></span>
            </span>
            <span class="meta-item" id="postReadTime" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              <span class="read-time-text"></span>
            </span>
            <span class="meta-item" th:if="${post.stats?.comment}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              </svg>
              <span th:text="${post.stats?.comment ?: 0} + ' 评论'"></span>
            </span>
            <span class="meta-item" th:if="${not #lists.isEmpty(post.categories)}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                  d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                />
              </svg>
              <a
                th:each="cat : ${post.categories}"
                th:href="@{${cat.status.permalink}}"
                th:text="${cat.spec.displayName}"
                style="color: inherit; margin-right: 4px"
              ></a>
            </span>
          </div>
        </header>

        <!-- Content -->
        <div class="prose" th:utext="${post.content.content}"></div>

        <!-- Footer -->
        <footer class="article-footer">
          <!-- Tags -->
          <div class="article-tags-row" th:if="${not #lists.isEmpty(post.tags)}">
            <a
              th:each="tag : ${post.tags}"
              th:href="@{${tag.status.permalink}}"
              th:text="${tag.spec.displayName}"
              class="tag"
            ></a>
          </div>

          <!-- Prev/Next Navigation -->
          <div class="post-nav" th:with="cursor = ${postFinder.cursor(post.metadata.name)}">
            <a
              class="post-nav-item"
              th:if="${cursor.hasPrevious()}"
              th:href="@{${cursor.previous.status.permalink}}"
            >
              <span class="post-nav-label">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 12px; height: 12px; display: inline; vertical-align: middle"
                >
                  <polyline points="15 18 9 12 15 6" />
                </svg>
                上一篇
              </span>
              <span class="post-nav-title" th:text="${cursor.previous.spec.title}"></span>
            </a>
            <span class="post-nav-item" th:unless="${cursor.hasPrevious()}" style="opacity: 0.4">
              <span class="post-nav-label">上一篇</span>
              <span class="post-nav-title">没有了</span>
            </span>
            <a
              class="post-nav-item next"
              th:if="${cursor.hasNext()}"
              th:href="@{${cursor.next.status.permalink}}"
            >
              <span class="post-nav-label">
                下一篇
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 12px; height: 12px; display: inline; vertical-align: middle"
                >
                  <polyline points="9 18 15 12 9 6" />
                </svg>
              </span>
              <span class="post-nav-title" th:text="${cursor.next.spec.title}"></span>
            </a>
            <span class="post-nav-item next" th:unless="${cursor.hasNext()}" style="opacity: 0.4">
              <span class="post-nav-label">下一篇</span>
              <span class="post-nav-title">没有了</span>
            </span>
          </div>
        </footer>
      </article>

      <!-- Comments -->
      <div th:if="${haloCommentEnabled}" style="margin-top: 24px">
        <halo:comment group="content.halo.run" kind="Post" th:attr="name=${post.metadata.name}" />
      </div>
    </div>

    <!-- TOC Sidebar -->
    <aside class="toc-sidebar" id="tocSidebar">
      <div class="toc-widget">
        <div class="toc-title">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            style="width: 16px; height: 16px"
          >
            <line x1="8" y1="6" x2="21" y2="6" />
            <line x1="8" y1="12" x2="21" y2="12" />
            <line x1="8" y1="18" x2="21" y2="18" />
            <line x1="3" y1="6" x2="3.01" y2="6" />
            <line x1="3" y1="12" x2="3.01" y2="12" />
            <line x1="3" y1="18" x2="3.01" y2="18" />
          </svg>
          <span>目录</span>
        </div>
        <nav class="toc-nav" id="tocNav"></nav>
      </div>
    </aside>
  </div>

  <!-- 移动端目录抽屉（由底部横条 #tocBtn 触发，仅 ≤768px 显示） -->
  <div class="toc-drawer-mask" id="tocDrawerMask"></div>
  <aside class="toc-drawer" id="tocDrawer" aria-hidden="true">
    <div class="toc-drawer-header">
      <span class="toc-drawer-title">目录</span>
      <button class="toc-drawer-close" id="tocDrawerClose" aria-label="关闭目录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <nav class="toc-drawer-nav" id="tocDrawerNav"></nav>
  </aside>
</include>
