<!-- ========================================== -->
<!--    Gateway Fragments - Logout             -->
<!--    退出登录表单片段（cosolar 主题化）          -->
<!-- ========================================== -->

<form th:fragment="form" class="halo-form cos-logout-form" th:action="@{/logout}" method="post">
  <!-- 用户信息卡片 -->
  <div th:if="${user != null}" class="cos-user-card" th:object="${user}">
    <img
      th:src="*{spec.avatar} ?: '/images/default-avatar.png'"
      th:alt="*{spec.displayName}"
      class="cos-user-avatar"
    />
    <div class="cos-user-meta">
      <p class="cos-user-name" th:text="*{spec.displayName}">User</p>
      <p class="cos-user-handle" th:text="|@*{metadata.name}|">@username</p>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="cos-logout-actions">
    <button type="submit" class="cos-btn-danger">确认退出</button>
    <a th:href="@{/}" class="cos-btn-ghost">取消</a>
  </div>
</form>
