apiVersion: v1alpha1
kind: Setting
metadata:
  name: cosolar-setting
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: attachment
          name: logo_image
          label: Logo 图片
          value: ""
          help: 上传 Logo 图片，留空则显示默认的代码图标
        - $formkit: number
          name: logo_image_width
          label: Logo 图片宽度
          value: 36
          min: 20
          max: 80
          step: 2
          help: Logo 图片的显示宽度（像素），建议 20-80
        - $formkit: number
          name: logo_image_height
          label: Logo 图片高度
          value: 36
          min: 20
          max: 80
          step: 2
          help: Logo 图片的显示高度（像素），建议 20-80
        - $formkit: text
          name: logo_text
          label: Logo 文字
          value: 码迹志
          help: 显示在头部导航栏的站点名称
        - $formkit: text
          name: tagline
          label: 站点标语
          value: 记录技术成长，分享解决方案
          help: 显示在 Logo 下方的副标题
        - $formkit: textarea
          name: footer_text
          label: 页脚版权文字
          value: ""
          help: 显示在页脚底部的版权信息，支持 HTML
        - $formkit: text
          name: icp
          label: ICP 备案号
          value: ""
          help: 如：京ICP备XXXXXXXX号

    - group: style
      label: 主题样式
      formSchema:
        - $formkit: color
          name: primary_color
          label: 主题色
          value: "#10B981"
          help: 主色调，用于按钮、链接、标签等强调元素
        - $formkit: radio
          name: color_scheme
          label: 默认配色方案
          value: auto
          options:
            - label: 跟随系统
              value: auto
            - label: 浅色
              value: light
            - label: 暗色
              value: dark
        - $formkit: number
          name: content_width
          label: 内容最大宽度
          value: 1200
          min: 960
          max: 1920
          step: 20
          help: 页面内容区域的最大宽度（像素），建议 960-1920
        - $formkit: number
          name: sidebar_width
          label: 侧边栏宽度
          value: 320
          min: 260
          max: 400
          step: 10
          help: 右侧侧边栏的宽度（像素），建议 260-400
        - $formkit: number
          name: content_gap
          label: 内容间距
          value: 24
          min: 12
          max: 48
          step: 2
          help: 内容区与侧边栏之间的间距（像素）
        - $formkit: number
          name: toc_width
          label: 文章目录宽度
          value: 240
          min: 180
          max: 320
          step: 10
          help: 文章页右侧目录（TOC）的宽度（像素），建议 180-320
        - $formkit: attachment
          name: default_post_cover
          label: 文章缺省封面图
          value: ""
          help: 文章未设置封面图时默认显示的图片，建议 16:9 横图；留空则显示代码图标占位符
        - $formkit: text
          name: font_family
          label: 正文字体族
          value: ""
          help: 自定义正文字体族（CSS font-family 语法），留空使用默认霞鹜文楷。例如 "Noto Sans SC", sans-serif 或 "LXGW WenKai", serif
        - $formkit: url
          name: font_css_url
          label: 字体 CSS 地址
          value: ""
          help: 第三方字体 CSS 链接（如 Google Fonts、字节跳动 FontAPI 等），留空则使用默认霞鹜文楷 CDN。例如 https://fonts.googleapis.com/css2?family=Noto+Sans+SC&display=swap
        - $formkit: text
          name: mono_family
          label: 等宽字体族
          value: ""
          help: 自定义代码/等宽字体族，留空使用默认 JetBrains Mono。例如 "Source Code Pro", monospace
        - $formkit: url
          name: mono_css_url
          label: 等宽字体 CSS 地址
          value: ""
          help: 第三方等宽字体 CSS 链接，留空则不额外加载
        - $formkit: url
          name: icon_css_url
          label: 图标字体 CSS 地址
          value: ""
          help: 第三方图标库 CSS 链接（如 Font Awesome、Remix Icon、Lucide 等），留空则使用主题内置 iconfont。例如 https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css
        - $formkit: text
          name: icon_prefix
          label: 图标类名前缀
          value: "iconfont"
          help: 图标 CSS 类名前缀，用于导航菜单图标。内置 iconfont 使用 iconfont，Font Awesome 使用 fa-solid/fas，Remix Icon 使用 ri，Lucide 使用 lucide
        # 代码高亮主题由 Halo plugin-shiki 插件后台配置（亮色/暗色主题），主题不再提供此选项

    - group: social
      label: 社交链接
      formSchema:
        - $formkit: switch
          name: show_footer_author
          label: 显示页脚博主信息
          value: true
          help: 在页脚显示博主头像、昵称、简介和社交链接卡片
        - $formkit: text
          name: author_name
          label: 博主昵称
          value: ""
          help: 显示在页脚博主卡片上的昵称，留空则使用站点标题
        - $formkit: attachment
          name: author_avatar
          label: 博主头像
          value: ""
          help: 显示在页脚博主卡片的头像图片，建议 1:1 方形图
        - $formkit: textarea
          name: author_bio
          label: 博主简介
          value: ""
          help: 显示在页脚博主卡片的一句话简介
        - $formkit: url
          name: github
          label: GitHub
          value: ""
          help: GitHub 主页地址
        - $formkit: email
          name: email
          label: 邮箱
          value: ""
        - $formkit: url
          name: juejin
          label: 掘金
          value: ""
        - $formkit: url
          name: csdn
          label: CSDN
          value: ""
          help: CSDN 博客主页地址
        - $formkit: url
          name: zhihu
          label: 知乎
          value: ""
          help: 知乎个人主页地址
        - $formkit: url
          name: rss
          label: RSS 订阅
          value: ""
          help: 留空则使用默认 RSS 地址

    - group: featured
      label: 精选轮播
      formSchema:
        - $formkit: switch
          name: show_featured
          label: 启用精选轮播
          value: true
          help: 在首页顶部显示精选文章轮播卡片
        - $formkit: attachment
          name: featured_cover
          label: 轮播默认背景图
          value: ""
          help: 精选文章轮播卡片的背景封面图，留空则使用主题自带的默认背景图；若文章本身有封面图则优先使用
        - $formkit: switch
          name: featured_cover_fallback
          label: 优先使用文章封面
          value: true
          help: 开启后，若文章本身设置了封面图则优先使用，否则使用上方配置的默认背景图
        - $formkit: postSelect
          name: featured_posts
          label: 精选文章列表
          value: []
          multiple: true
          help: 选择要在首页轮播展示的文章，可拖拽排序
        - $formkit: switch
          name: autoplay
          label: 自动轮播
          value: true
          help: 开启后卡片自动切换
        - $formkit: number
          name: interval
          label: 轮播间隔（毫秒）
          value: 5000
          min: 1000
          step: 500
          help: 自动轮播的切换间隔时间，单位毫秒，最小 1000
        - $formkit: number
          name: featured_max_count
          label: 轮播最大文章数
          value: 5
          min: 1
          max: 10
          step: 1
          help: 回退模式下轮播最多显示的文章数量
        - $formkit: radio
          name: fallback
          label: 无配置时的回退策略
          value: latest
          options:
            - label: 显示最新文章
              value: latest
            - label: 显示置顶文章
              value: pinned
            - label: 不显示
              value: none

    - group: sidebar
      label: 侧边栏设置
      formSchema:
        - $formkit: switch
          name: show_sidebar
          label: 显示侧边栏
          value: true
          help: 在首页和列表页显示右侧侧边栏；小屏（≤768px）下自动隐藏
        - $formkit: switch
          name: show_author
          label: 显示博主展示
          value: true
          help: 在侧边栏顶部显示博主个人信息卡片
        - $formkit: attachment
          name: author_bg_image
          label: 博主背景图
          value: ""
          help: 博主展示模块的背景封面图，建议深色图片配合文字效果更佳。与"博主背景色"二选一，同时设置时背景图优先
        - $formkit: color
          name: author_bg_color
          label: 博主背景色
          value: ""
          help: 博主展示模块的背景色，与"博主背景图"二选一，同时设置时背景图优先；留空则使用默认卡片样式
        - $formkit: color
          name: author_bg_overlay_color
          label: 遮罩层颜色
          value: "#000000"
          help: 博主背景图上的遮罩层颜色，配合下方"遮罩层透明度"一起使用
        - $formkit: range
          name: author_bg_overlay_opacity
          label: 遮罩层透明度
          value: 0.35
          min: 0
          max: 1
          step: 0.05
          help: 遮罩层的不透明度，0 为完全透明，1 为完全不透明
        - $formkit: color
          name: author_bg_text_color
          label: 博主栏文字颜色
          value: "#FFFFFF"
          help: 设置背景图/背景色后，博主卡片内所有文字和图标的颜色
        - $formkit: color
          name: author_bg_overlay_color_dark
          label: 遮罩层颜色（深色模式）
          value: "#000000"
          help: 深色模式下博主背景图上的遮罩层颜色
        - $formkit: range
          name: author_bg_overlay_opacity_dark
          label: 遮罩层透明度（深色模式）
          value: 0.45
          min: 0
          max: 1
          step: 0.05
          help: 深色模式下遮罩层的不透明度，默认略高于浅色模式
        - $formkit: color
          name: author_bg_text_color_dark
          label: 博主栏文字颜色（深色模式）
          value: "#FFFFFF"
          help: 深色模式下博主卡片内所有文字和图标的颜色
        - $formkit: switch
          name: show_announcement
          label: 显示公告栏
          value: true
          help: 在侧边栏博主信息下方显示公告栏
        - $formkit: textarea
          name: announcement_content
          label: 公告内容
          value: ""
          help: 公告栏显示的文本内容，支持 HTML
        - $formkit: switch
          name: show_tag_cloud
          label: 显示热门标签
          value: true
          help: 以词云形式展示标签，标签大小随文章数自动变化
        - $formkit: number
          name: tag_cloud_count
          label: 热门标签数量
          value: 20
          min: 5
          max: 50
          step: 1
          help: 标签云中最多显示的标签数量
        - $formkit: switch
          name: show_wechat_qr
          label: 显示公众号二维码
          value: false
          help: 在侧边栏显示微信公众号二维码图片
        - $formkit: attachment
          name: wechat_qr_image
          label: 公众号二维码图片
          value: ""
          help: 上传微信公众号二维码图片，建议 1:1 正方形
        - $formkit: text
          name: wechat_qr_title
          label: 公众号名称
          value: ""
          help: 显示在二维码下方的公众号名称，留空则显示"扫码关注"
        - $formkit: switch
          name: show_categories
          label: 显示分类导航
          value: true
        - $formkit: number
          name: categories_count
          label: 分类显示数量
          value: 6
          min: 1
          max: 30
          help: 侧边栏分类导航最多显示的分类数量
        - $formkit: switch
          name: show_recent
          label: 显示近期更新
          value: true
        - $formkit: number
          name: recent_count
          label: 近期更新数量
          value: 4
          min: 1
          max: 30
        - $formkit: switch
          name: show_sidebar_links
          label: 显示友情链接模块
          value: true
          help: 在侧边栏显示友情链接模块，展示随机友链
        - $formkit: number
          name: sidebar_links_count
          label: 友情链接显示数量
          value: 10
          min: 1
          max: 30
          step: 1
          help: 侧边栏友情链接模块最多展示的友链数量
        - $formkit: switch
          name: show_sidebar_feeds
          label: 显示订阅资讯模块
          value: true
          help: 在侧边栏显示订阅资讯模块，展示友站 RSS 最新动态；需启用插件 RSS 订阅公开功能
        - $formkit: number
          name: sidebar_feeds_count
          label: 订阅资讯显示数量
          value: 10
          min: 1
          max: 30
          step: 1
          help: 侧边栏订阅资讯模块最多展示的资讯条目数量
        - $formkit: array
          name: sidebar_modules
          label: 侧边栏模块顺序
          help: 拖动每行可调整模块上下顺序；点击删除可隐藏对应模块，点击"添加模块"可重新加入；模块需在下方各自设置中已开启才会显示
          addLabel: 添加模块
          min: 0
          max: 8
          value:
            - module: author
            - module: announcement
            - module: tag_cloud
            - module: wechat
            - module: categories
            - module: recent
            - module: links
            - module: feeds
          children:
            - $formkit: select
              name: module
              label: 模块
              value: author
              options:
                - label: 博主展示
                  value: author
                - label: 公告
                  value: announcement
                - label: 热门标签
                  value: tag_cloud
                - label: 公众号
                  value: wechat
                - label: 分类导航
                  value: categories
                - label: 近期更新
                  value: recent
                - label: 友情链接
                  value: links
                - label: 订阅资讯
                  value: feeds

    - group: category
      label: 分类页设置
      formSchema:
        - $formkit: attachment
          name: categories_cover
          label: 分类列表页封面图
          value: ""
          help: 分类列表页顶部 Header 区域的背景封面图，留空则显示默认渐变背景
        - $formkit: attachment
          name: category_cover
          label: 分类详情页封面图
          value: ""
          help: 分类详情页顶部 Hero 区域的背景封面图，留空则显示默认渐变背景
        - $formkit: switch
          name: category_cover_fallback
          label: 优先使用分类自带封面
          value: true
          help: 开启后，若分类本身设置了封面图则优先使用，否则使用上方配置的默认封面图

    - group: tag
      label: 标签页设置
      formSchema:
        - $formkit: attachment
          name: tags_cover
          label: 标签列表页封面图
          value: ""
          help: 标签列表页顶部 Hero 区域的背景封面图，留空则显示默认渐变背景
        - $formkit: attachment
          name: tag_cover
          label: 标签详情页封面图
          value: ""
          help: 标签详情页顶部 Hero 区域的背景封面图，留空则显示默认渐变背景；若标签本身设置了封面图则优先使用

    - group: archive
      label: 归档页设置
      formSchema:
        - $formkit: attachment
          name: archives_cover
          label: 归档页封面图
          value: ""
          help: 归档页顶部 Header 区域的背景封面图，留空则显示默认渐变背景

    - group: links
      label: 友情链接页设置
      formSchema:
        - $formkit: text
          name: links_title
          label: 页面标题
          value: "友情链接"
          help: 友情链接页面的标题文字
        - $formkit: text
          name: links_subtitle
          label: 页面副标题
          value: "与优秀的开发者们互相学习，共同进步，以下是我精心挑选的技术伙伴们"
          help: 显示在友情链接页标题下方的描述文字
        - $formkit: attachment
          name: links_cover
          label: 友情链接页封面图
          value: ""
          help: 友情链接页顶部 Hero 区域的背景封面图，留空则显示默认渐变背景

    - group: feeds
      label: RSS 资讯页设置
      formSchema:
        - $formkit: text
          name: feeds_title
          label: 页面标题
          value: "RSS 资讯"
          help: RSS 资讯页面的标题文字
        - $formkit: text
          name: feeds_subtitle
          label: 页面副标题
          value: "聚合优质信息源，掌握技术前沿动态"
          help: 显示在标题下方的描述文字
        - $formkit: attachment
          name: feeds_cover
          label: 页面封面图
          value: ""
          help: RSS 资讯页顶部 Hero 区域的背景封面图，留空则显示默认渐变背景
        - $formkit: number
          name: feeds_page_size
          label: 每页资讯数量
          value: 10
          min: 5
          max: 50
          step: 5
          help: 每页显示的 RSS 资讯条目数量，建议 10-30

    - group: background_light
      label: 页面背景 · 浅色模式
      formSchema:
        - $formkit: select
          name: bg_type
          label: 背景类型
          value: none
          options:
            - label: 无（默认纯色）
              value: none
            - label: 自定义背景图
              value: image
            - label: 动态渲染背景
              value: dynamic
          help: 浅色模式下的页面背景类型
        - $formkit: attachment
          name: bg_image
          label: 背景图
          value: ""
          help: 浅色模式下显示的背景图，建议使用浅色调、低饱和度图片以免影响内容阅读
        - $formkit: range
          name: bg_image_opacity
          label: 背景图透明度
          value: 0.2
          min: 0.05
          max: 1
          step: 0.05
          help: 背景图的不透明度，值越小越淡，避免影响内容阅读
        - $formkit: select
          name: bg_dynamic_type
          label: 动态背景类型
          value: particles
          options:
            - label: 粒子连线
              value: particles
            - label: 渐变流光
              value: gradient
            - label: 气泡漂浮
              value: bubbles
            - label: 星空闪烁
              value: stars
            - label: 网格波纹
              value: mesh
          help: 浅色模式下的动态渲染背景效果
        - $formkit: color
          name: bg_dynamic_color1
          label: 动态背景主色
          value: "#10B981"
          help: 动态背景的主要颜色
        - $formkit: color
          name: bg_dynamic_color2
          label: 动态背景辅色
          value: "#3B82F6"
          help: 动态背景的辅助颜色，用于渐变和混合效果
        - $formkit: range
          name: bg_dynamic_opacity
          label: 动态背景透明度
          value: 0.15
          min: 0.05
          max: 0.5
          step: 0.05
          help: 动态背景的不透明度，值越小越淡

    - group: background_dark
      label: 页面背景 · 深色模式
      formSchema:
        - $formkit: select
          name: bg_type
          label: 背景类型
          value: none
          options:
            - label: 无（默认纯色）
              value: none
            - label: 自定义背景图
              value: image
            - label: 动态渲染背景
              value: dynamic
          help: 深色模式下的页面背景类型
        - $formkit: attachment
          name: bg_image
          label: 背景图
          value: ""
          help: 深色模式下显示的背景图，建议使用深色调图片
        - $formkit: range
          name: bg_image_opacity
          label: 背景图透明度
          value: 0.2
          min: 0.05
          max: 1
          step: 0.05
          help: 背景图的不透明度，值越小越淡，避免影响内容阅读
        - $formkit: select
          name: bg_dynamic_type
          label: 动态背景类型
          value: stars
          options:
            - label: 粒子连线
              value: particles
            - label: 渐变流光
              value: gradient
            - label: 气泡漂浮
              value: bubbles
            - label: 星空闪烁
              value: stars
            - label: 网格波纹
              value: mesh
          help: 深色模式下的动态渲染背景效果，默认星空闪烁
        - $formkit: color
          name: bg_dynamic_color1
          label: 动态背景主色
          value: "#10B981"
          help: 动态背景的主要颜色
        - $formkit: color
          name: bg_dynamic_color2
          label: 动态背景辅色
          value: "#3B82F6"
          help: 动态背景的辅助颜色，用于渐变和混合效果
        - $formkit: range
          name: bg_dynamic_opacity
          label: 动态背景透明度
          value: 0.15
          min: 0.05
          max: 0.5
          step: 0.05
          help: 动态背景的不透明度，值越小越淡

    - group: login
      label: 登录页面
      formSchema:
        - $formkit: number
          name: brand_ratio
          label: 左侧品牌区占比
          value: 33
          min: 20
          max: 60
          step: 1
          help: 登录页左侧品牌展示区占整个页面的宽度百分比，剩余部分留给右侧登录表单，建议 20-60
        - $formkit: switch
          name: brand_overlay_enabled
          label: 显示遮罩层
          value: true
          help: 是否在左侧品牌区背景图上叠加渐变遮罩层以保证文字可读；关闭后不显示任何遮罩，直接透出背景图
        - $formkit: color
          name: brand_overlay_color
          label: 遮罩渐变主色
          value: "#059669"
          help: 左侧品牌区遮罩层的渐变主色，由该颜色按透明度从实色渐变到透明（配合下方"遮罩渐变透明度"控制起始不透明度）
        - $formkit: color
          name: brand_overlay_color_dark
          label: 遮罩渐变主色（深色模式）
          value: "#059669"
          help: 深色模式下左侧品牌区遮罩层的渐变主色
        - $formkit: range
          name: brand_overlay_opacity
          label: 遮罩渐变透明度
          value: 0.6
          min: 0
          max: 1
          step: 0.05
          help: 遮罩渐变起始处（最实）的不透明度，0 为完全透明，1 为完全不透明；向下渐变至透明
        - $formkit: range
          name: brand_overlay_opacity_dark
          label: 遮罩渐变透明度（深色模式）
          value: 0.5
          min: 0
          max: 1
          step: 0.05
          help: 深色模式下遮罩渐变起始处的不透明度
        - $formkit: color
          name: brand_text_color
          label: 品牌区文字颜色
          value: "#FFFFFF"
          help: 左侧品牌区内 Logo、站点名、标语等文字颜色
